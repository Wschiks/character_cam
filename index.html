<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASCII Art</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --panel: #111;
      --border: #2a2a2a;
      --accent: #00ff99;
      --accent2: #ff3366;
      --font-mono: 'Share Tech Mono', monospace;
      --font-head: 'Orbitron', sans-serif;
      --box-size: min(42vw, 420px);
    }

    body {
      background: var(--bg);
      color: #ccc;
      font-family: var(--font-mono);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    header h1 {
      font-family: var(--font-head);
      font-size: 1.1rem;
      letter-spacing: 0.15em;
      color: var(--accent);
      text-shadow: 0 0 12px var(--accent);
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .btn {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      padding: 8px 16px;
      border: 1px solid var(--accent);
      background: transparent;
      color: var(--accent);
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
    }
    .btn:hover { background: var(--accent); color: #000; }
    .btn.cam { border-color: var(--accent2); color: var(--accent2); }
    .btn.cam:hover, .btn.cam.active { background: var(--accent2); color: #000; }
    label.btn { display: inline-block; }
    #myFile { display: none; }

    main {
      flex: 1;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: flex-start;
      gap: 16px;
      padding: 24px 16px;
    }

    .box {
      width: var(--box-size);
      height: var(--box-size);
      border: 1px solid var(--border);
      background: var(--panel);
      display: flex;
      flex-direction: column;
    }

    @media (max-width: 600px) {
      :root { --box-size: 90vw; }
    }

    .box-title {
      font-family: var(--font-head);
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      color: var(--accent);
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .box-inner {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #preview {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: none;
    }

    #video {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: none;
    }

    .placeholder {
      font-size: 0.75rem;
      color: #444;
      text-align: center;
      padding: 20px;
      letter-spacing: 0.1em;
    }

    #ascii-box .box-inner {
      overflow: hidden;
      align-items: center;
      justify-content: center;
    }

    #ascii {
      font-family: var(--font-mono);
      white-space: pre;
      transform-origin: center center;
    }

    canvas { display: none; }
  </style>
</head>
<body>

<header>
  <h1>ASCII//ART</h1>
  <div class="controls">
    <label class="btn" for="myFile">&#x1F4C2; Upload Image</label>
    <input type="file" id="myFile" accept="image/*">
    <button class="btn cam" id="camBtn">&#x1F4F7; Camera</button>
  </div>
</header>

<main>
  <div class="box">
    <div class="box-title">// Source</div>
    <div class="box-inner">
      <span class="placeholder" id="placeholder">No input selected.<br>Upload an image or turn on camera.</span>
      <img id="preview">
      <video id="video" autoplay playsinline></video>
    </div>
  </div>

  <div class="box" id="ascii-box">
    <div class="box-title">// ASCII Output</div>
    <div class="box-inner" id="ascii-inner">
      <pre id="ascii"></pre>
    </div>
  </div>
</main>

<canvas id="canvas"></canvas>
<script src="art.js"></script>
</body>
</html>
